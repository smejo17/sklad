<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sklad &amp; Zásielky — prototyp</title>
<style>
  :root{--blue:#3b6fd4;--green:#2e9e5b;--orange:#e08a1e;--purple:#7a4fc0;--dark:#1f2733;--grey:#5b6472;--line:#e2e8f2;--bg:#f5f7fb;--card:#fff}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--dark);font-size:14px}
  .app{display:flex;min-height:100vh}
  .side{width:238px;background:#111a2b;color:#c7d2e2;display:flex;flex-direction:column;position:fixed;height:100vh}
  .side .brand{padding:18px 18px 12px;font-weight:700;color:#fff;font-size:15px;line-height:1.3;border-bottom:1px solid #22304a}
  .side .brand small{display:block;font-weight:400;color:#8798b3;font-size:11px;margin-top:3px}
  .nav{padding:10px 0;flex:1;overflow:auto}
  .nav .grp{padding:12px 18px 4px;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:#6b7c9a}
  .nav a{display:flex;align-items:center;gap:10px;padding:9px 18px;color:#c7d2e2;text-decoration:none;cursor:pointer;border-left:3px solid transparent;font-size:13.5px}
  .nav a:hover{background:#1a2740;color:#fff}
  .nav a.active{background:#1a2740;color:#fff;border-left-color:var(--blue)}
  .nav a .ic{width:18px;text-align:center}
  .side .foot{padding:12px 18px;border-top:1px solid #22304a;font-size:12px;color:#8798b3}
  .side .foot label{display:block;margin-bottom:4px}
  .side .foot select{width:100%;margin-bottom:10px;background:#1a2740;color:#fff;border:1px solid #2b3a58;border-radius:6px;padding:6px}
  .main{margin-left:238px;flex:1;padding:22px 26px}
  .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
  .head h1{font-size:21px;font-weight:700}
  .head .sub{color:var(--grey);font-size:12.5px;margin-top:2px}
  .btn{background:var(--blue);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600}
  .btn:hover{filter:brightness(1.07)}
  .btn.ghost{background:#fff;color:var(--dark);border:1px solid var(--line)}
  .btn.sm{padding:5px 10px;font-size:12px;border-radius:6px}
  .btn.danger{background:#d9534f}.btn.green{background:var(--green)}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:22px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px}
  .kpi .n{font-size:26px;font-weight:700}.kpi .l{color:var(--grey);font-size:12.5px;margin-top:3px}.kpi .bar{height:3px;border-radius:3px;margin-top:12px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:visible;margin-bottom:20px}
  .panel .ph{padding:13px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
  .panel .ph h3{font-size:14.5px}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:10px 14px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}
  th{background:#f7f9fc;color:var(--grey);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em}
  tbody tr:hover{background:#f9fbfe}
  .tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11.5px;font-weight:600}
  .tag.g{background:#e4f6ea;color:#1d7d43}.tag.o{background:#fdf0df;color:#a8630c}.tag.b{background:#e6eefb;color:#2a4fa0}
  .tag.gr{background:#eef1f6;color:#5b6472}.tag.r{background:#fde8e7;color:#b02a26}.tag.p{background:#f0e9fb;color:#5e37a6}
  .muted{color:var(--grey)}
  .link{color:var(--blue);cursor:pointer;font-weight:700}.link:hover{text-decoration:underline}
  .thumb{width:36px;height:36px;border-radius:7px;object-fit:cover;background:#eef1f6;vertical-align:middle;cursor:zoom-in;border:1px solid var(--line)}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .toolbar input,.toolbar select{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:#fff}
  .toolbar input[type=search]{min-width:220px}
  .info{cursor:help;color:var(--blue);font-weight:700;border:1px solid var(--blue);border-radius:50%;width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;margin-left:5px}
  .empty{padding:30px;text-align:center;color:var(--grey)}
  .ov{position:fixed;inset:0;background:rgba(15,23,40,.5);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .ov.show{display:flex}
  .modal{background:#fff;border-radius:14px;width:100%;max-width:640px;max-height:92vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
  .modal .mh{padding:16px 20px;border-bottom:1px solid var(--line);font-weight:700;font-size:16px;display:flex;justify-content:space-between}
  .modal .mb{padding:18px 20px}
  .modal .mf{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px}
  .fld{margin-bottom:13px}
  .fld label{display:block;font-size:12px;color:var(--grey);margin-bottom:5px;font-weight:600}
  .fld input,.fld select,.fld textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:13.5px;font-family:inherit}
  .fld textarea{min-height:70px;resize:vertical}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .x{cursor:pointer;color:var(--grey);font-size:20px;line-height:1}
  .chk{display:flex;align-items:center;gap:8px}.chk input{width:auto}
  .pill{font-size:11px;padding:2px 8px;border-radius:6px;background:#eef1f6;color:var(--grey)}
  .crypto{color:var(--purple);font-weight:600}
  .note{background:#fff8ec;border:1px solid #f3e2c0;color:#8a5a12;padding:10px 12px;border-radius:8px;font-size:12.5px;margin-bottom:14px}
  .warn{background:#fde7e7;border:1px solid #f3c4c4;color:#9c2b2b}
  .box{background:#f7f9fc;border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:12px}
  .box h4{font-size:12px;color:var(--grey);text-transform:uppercase;letter-spacing:.03em;margin-bottom:10px}
  .sugg{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .chip{border-radius:16px;padding:4px 11px;font-size:12px;cursor:pointer;border:1px solid #cfe0ff;background:#eef4ff;color:var(--blue)}
  .chip:hover{background:#dbe8ff}
  .chip.tag{border-color:#d9cef2;background:#f3eefb;color:#5e37a6}
  .chip.tag.on{background:var(--purple);color:#fff;border-color:var(--purple)}
  .comp-row{display:flex;gap:8px;align-items:center;margin-bottom:6px}
  .comp-row select{flex:1}.comp-row input{width:70px}
  .dupitem{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:6px 0;border-bottom:1px dashed #eadfc0}
  .score{font-weight:700;border-radius:6px;padding:2px 8px;font-size:12px}
  .attrgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .kv{display:grid;grid-template-columns:150px 1fr;gap:8px;padding:5px 0;border-bottom:1px solid #f0f3f8;font-size:13px}
  .kv .k{color:var(--grey)}
  #imgprev{position:fixed;display:none;z-index:100;background:#fff;border:1px solid var(--line);border-radius:10px;padding:6px;box-shadow:0 12px 40px rgba(0,0,0,.25)}
  #imgprev img{width:240px;height:240px;object-fit:contain;display:block;border-radius:6px;background:#f4f6fa}
  #imgprev .cap{font-size:11px;color:var(--grey);text-align:center;padding-top:4px;max-width:240px}
  .grp-row td{background:#eef4ff;color:var(--blue);font-weight:700}
  .tagline{margin-top:4px;display:flex;gap:4px;flex-wrap:wrap}
  .tagline .t{font-size:10.5px;background:#f3eefb;color:#5e37a6;border-radius:10px;padding:1px 7px}
  .detimg{width:100%;height:220px;object-fit:contain;background:#f4f6fa;border-radius:10px;border:1px solid var(--line);margin-bottom:12px}
  /* tlač QR */
  .qrsheet{display:flex;flex-wrap:wrap;gap:4mm;background:#fff;padding:6mm;border:1px solid var(--line);border-radius:8px}
  .qrcell{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;page-break-inside:avoid}
  .qrcell img{display:block;border:1px solid #eee}
  .qrcell .qlbl{font-size:8pt;text-align:center;margin-top:1mm;max-width:34mm;word-break:break-word;line-height:1.1}
  .qrcell.cut{border:1px dashed #9aa4b3;padding:2mm;border-radius:2px}
  .qrsheet.cut{gap:0}
  @media print{.side,.head,#qr_controls,.noprint{display:none!important}.main{margin:0!important;padding:0!important}.qrsheet{border:0;padding:0}.panel{border:0}}
  @media(max-width:860px){.side{width:64px}.side .brand small,.nav .grp,.nav a span.t,.side .foot{display:none}.main{margin-left:64px}.nav a{justify-content:center}}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand" id="brand"></div>
    <nav class="nav" id="nav">
      <div class="grp" data-t="nav.overview_grp"></div>
      <a data-v="dash" class="active"><span class="ic">▦</span><span class="t" data-t="nav.dash"></span></a>
      <div class="grp" data-t="nav.wh_grp"></div>
      <a data-v="products"><span class="ic">📦</span><span class="t" data-t="nav.products"></span></a>
      <a data-v="inventory"><span class="ic">🗄️</span><span class="t" data-t="nav.inventory"></span></a>
      <a data-v="docs"><span class="ic">🧾</span><span class="t" data-t="nav.docs"></span></a>
      <a data-v="stocktake"><span class="ic">📋</span><span class="t" data-t="nav.stocktake"></span></a>
      <a data-v="assets"><span class="ic">🧰</span><span class="t" data-t="nav.assets"></span></a>
      <a data-v="qr"><span class="ic">🏷️</span><span class="t" data-t="nav.qr"></span></a>
      <div class="grp" data-t="nav.ship_grp"></div>
      <a data-v="shipments"><span class="ic">🚚</span><span class="t" data-t="nav.shipments"></span></a>
      <div class="grp" data-t="nav.admin_grp"></div>
      <a data-v="dedup"><span class="ic">🧹</span><span class="t" data-t="nav.dedup"></span></a>
      <a data-v="roles"><span class="ic">🔐</span><span class="t" data-t="nav.roles"></span></a>
      <a data-v="users"><span class="ic">👤</span><span class="t" data-t="nav.users"></span></a>
      <a data-v="currencies"><span class="ic">💱</span><span class="t" data-t="nav.currencies"></span></a>
    </nav>
    <div class="foot">
      <label data-t="side.language"></label>
      <select id="lang" onchange="app.setLang(this.value)"><option value="sk">Slovenčina</option><option value="cs">Čeština</option><option value="en">English</option></select>
      <label data-t="side.loggedas"></label>
      <select id="role" onchange="app.setRole(this.value)"><option value="admin">Admin</option><option value="user">User</option><option value="visitor">Visitor</option></select>
    </div>
  </aside>
  <main class="main" id="main"></main>
</div>
<div class="ov" id="ov"><div class="modal" id="modal"></div></div>
<div id="imgprev"><img><div class="cap"></div></div>

function ancestors(id){const out=[];let c=catById(id);while(c){out.push(c.id);c=c.parent?catById(c.parent):null;}return out;}
function catPath(id){const c=catById(id);if(!c)return "—";return c.parent?catLabel(catById(c.parent))+" › "+catLabel(c):catLabel(c);}

// similarity
function stripDia(s){return s.normalize("NFD").replace(/[̀-ͯ]/g,"");}
function normKey(s){s=stripDia((s||"").toLowerCase());s=s.replace(/(\d),(\d)/g,"$1.$2");s=s.replace(/(\d+(?:\.\d+)?)\s*cm\b/g,(m,n)=>((+n)/100));s=s.replace(/[^a-z0-9]+/g," ");return s.replace(/\s+/g," ").trim();}
function tokens(s){return [...new Set(normKey(s).split(" ").filter(w=>w.length>1))];}
function lev(a,b){if(a===b)return 0;const m=a.length,n=b.length;if(Math.abs(m-n)>1)return 2;const dp=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);for(let j=0;j<=n;j++)dp[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1));return dp[m][n];}
function tokMatch(x,B){return B.some(y=>x===y||((x.length>=4||y.length>=4)&&lev(x,y)<=1));}
function jaccard(a,b){const A=tokens(a),B=tokens(b);if(!A.length||!B.length)return 0;let inter=0;A.forEach(x=>{if(tokMatch(x,B))inter++;});return inter/(A.length+B.length-inter);}

function similarity(a,b){if(a.sku&&b.sku&&a.sku.toLowerCase()===b.sku.toLowerCase())return 1;let s=jaccard(nameOfProduct(a),nameOfProduct(b));if(a.categoryId===b.categoryId)s+=0.08;return Math.min(1,s);}

function addTag(){
  let x=prompt(t("pf.add_tag_prompt"));if(!x||!x.trim())return;x=x.trim();
  // kontrola duplicity tagu (preklepy / varianty)
  const similar=db.tags.map(tg=>tg.name).find(n=>n.toLowerCase()===x.toLowerCase()||lev(normKey(n),normKey(x))<=1||normKey(n)===normKey(x));
  if(similar&&similar.toLowerCase()!==x.toLowerCase()){if(confirm(t("pf.tag_dupe",{x:similar}))){x=similar;}}
  const exists=db.tags.find(tg=>tg.name.toLowerCase()===x.toLowerCase());
  if(!exists){db.tags.push({name:x,cats:currentCatId()?[currentCatId()]:[]});save();}

function normalizeSpec(raw){let s=(raw||"").trim().replace(/\s+/g," ");s=s.replace(/(\d),(\d)/g,"$1.$2");s=s.replace(/(\d+(?:\.\d+)?)\s*cm\b/gi,(m,n)=>((+n)/100).toString().replace(/\.?0+$/,"")+" m");s=s.replace(/(\d)\s*(mm|m|kg|g|w|v|a|gb|tb|th\/s|mhz|ghz)\b/gi,(m,n,u)=>{const U={mm:"mm",m:"m",kg:"kg",g:"g",w:"W",v:"V",a:"A",gb:"GB",tb:"TB","th/s":"Th/s",mhz:"MHz",ghz:"GHz"};return n+" "+(U[u.toLowerCase()]||u);});return s;}

// ---- DEDUP ----
function dedup(){
  const canMerge=can("product.merge");const pairs=[];
  for(let i=0;i<db.products.length;i++)for(let j=i+1;j<db.products.length;j++){const s=similarity(db.products[i],db.products[j]);if(s>=0.5)pairs.push({a:db.products[i],b:db.products[j],s});}
  pairs.sort((x,y)=>y.s-x.s);
  const body=pairs.length?`<div class="panel"><table><thead><tr><th>${t("dd.col_pair")}</th><th>${t("dd.col_score")}</th><th></th></tr></thead><tbody>`+
    pairs.map(pr=>`<tr><td><b>${esc(pr.a.name)}</b> <span class="muted">↔</span> <b>${esc(pr.b.name)}</b><div class="muted" style="font-size:11.5px">${esc(catPath(pr.a.categoryId))} · ${esc(catPath(pr.b.categoryId))}</div></td><td><span class="score" style="background:${pr.s>0.7?'#fde8e7;color:#b02a26':'#fdf0df;color:#a8630c'}">${Math.round(pr.s*100)}%</span></td><td style="text-align:right">${canMerge?`<button class="btn sm" onclick="mergeDialog(${pr.a.id},${pr.b.id})">${t("dd.merge")}</button>`:""}</td></tr>`).join("")+`</tbody></table></div>`:`<div class="panel"><div class="empty">${t("dd.none")}</div></div>`;
  shell(t("dd.title"),t("dd.sub"),"",body);
}
function mergeDialog(aId,bId){const a=prod(aId),b=prod(bId);const cnt=id=>db.inventory.filter(i=>i.productId===id).length;
  modal(t("dd.merge_title"),`<div class="note">${t("dd.merge_note")}</div><div class="fld"><label>${t("dd.keep")}</label><label class="chk" style="margin-bottom:8px"><input type="radio" name="keep" value="${a.id}" checked> <b>${esc(a.name)}</b> <span class="muted">(${cnt(a.id)} ks · ${esc(catPath(a.categoryId))})</span></label><label class="chk"><input type="radio" name="keep" value="${b.id}"> <b>${esc(b.name)}</b> <span class="muted">(${cnt(b.id)} ks · ${esc(catPath(b.categoryId))})</span></label></div>`,`<button class="btn ghost" onclick="closeModal()">${t("c.cancel")}</button><button class="btn" onclick="doMerge(${a.id},${b.id})">${t("dd.confirm")}</button>`);}
function doMerge(aId,bId){const keepId=Number(document.querySelector('input[name=keep]:checked').value);const dropId=keepId===aId?bId:aId;const keep=prod(keepId),drop=prod(dropId);keep.aliases=keep.aliases||[];if(drop.name&&!keep.aliases.includes(drop.name))keep.aliases.push(drop.name);(drop.aliases||[]).forEach(al=>{if(!keep.aliases.includes(al))keep.aliases.push(al);});(drop.tags||[]).forEach(tg=>{keep.tags=keep.tags||[];if(!keep.tags.includes(tg))keep.tags.push(tg);});if(!keep.sku&&drop.sku)keep.sku=drop.sku;db.inventory.forEach(i=>{if(i.productId===dropId)i.productId=keepId;});db.products.forEach(p=>{(p.components||[]).forEach(c=>{if(c.productId===dropId)c.productId=keepId;});});db.products=db.products.filter(p=>p.id!==dropId);save();closeModal();dedup();}

// ---- INVENTORY (zásoby: šarže zoskupené po produkte) ----
function locsOf(whId){const w=db.warehouses.find(w=>w.id===Number(whId));return w&&w.locations?w.locations:[];} // [{code,desc}]
function whColor(whId){const w=db.warehouses.find(w=>w.id===Number(whId));return w&&w.color?w.color:"#5b6472";}
function locDesc(whId,code){const l=locsOf(whId).find(x=>x.code===code);return l?l.desc:"";}
function locOptionsHtml(whId,sel){return locsOf(whId).map(l=>`<option value="${esc(l.code)}" ${sel===l.code?"selected":""}>${esc(l.code)}${l.desc?" — "+esc(l.desc):""}</option>`).join("");}
function invMatch(l){
  const p=prod(l.productId)||{};
  if(p.premium&&!can("premium.view"))return false;
  if(state.iwh&&l.warehouseId!==Number(state.iwh))return false;
  if(state.iloc&&l.location!==state.iloc)return false;
  if(state.icat&&!ancestors(p.categoryId).includes(Number(state.icat)))return false;
  if(state.istate&&l.state!==state.istate)return false;
  if(state.iq){const q=state.iq.toLowerCase();if(!((p.name+" "+(p.sku||"")+" "+(l.serial||"")+" "+(l.qr||"")+" "+(l.location||"")).toLowerCase().includes(q)))return false;}
  return true;
}
function inventory(){
  const canMove=can("inventory.move");
  const lots=db.inventory.filter(invMatch);
  // zoskupiť podľa produktu
  const groups={};lots.forEach(l=>{(groups[l.productId]=groups[l.productId]||[]).push(l);});
  const pids=Object.keys(groups).map(Number).sort((a,b)=>(prod(a)?.name||"").localeCompare(prod(b)?.name||""));
  let body="";
  pids.forEach(pid=>{
    const p=prod(pid)||{};const gl=groups[pid];
    const totalQ=gl.reduce((s,l)=>s+(Number(l.quantity)||0),0);
    const places=new Set(gl.map(l=>l.warehouseId+"|"+l.location)).size;
    const whCnt=new Set(gl.map(l=>l.warehouseId)).size;
    const exp=state.iexp.includes(pid);
    const allSel=gl.every(l=>state.isel.includes(l.id));
    const thumb=p.image?`<img class="thumb" src="${esc(p.image)}" data-full="${esc(p.image)}" data-cap="${esc(p.name)}">`:`<span class="thumb"></span>`;
    // súhrn do správnych stĺpcov (žiadny colspan)
    const whCell=whCnt===1?esc(whName(gl[0].warehouseId)):whCnt+"×";
    const curSet=[...new Set(gl.map(l=>l.buyCur))];const prices=gl.map(l=>Number(l.buyPrice)).filter(x=>!isNaN(x));
    let priceCell="—";
    if(curSet.length===1&&prices.length){const mn=Math.min(...prices),mx=Math.max(...prices);priceCell=mn===mx?money(mn,curSet[0]):money(mn,curSet[0])+" – "+money(mx,curSet[0]);}
    body+=`<tr style="background:#f4f7fb;cursor:pointer" onclick="toggleExp(${pid})">
      <td onclick="event.stopPropagation()"><input type="checkbox" ${allSel?"checked":""} onchange="groupToggle(${pid},this.checked)"></td>
      <td>${exp?"▾":"▸"} ${thumb} <span class="link" onclick="event.stopPropagation();openDetail(${pid})">${esc(p.name)}</span><div class="muted" style="font-size:11px">${esc(catPath(p.categoryId))} · ${gl.length} ${t("iv.lots")}</div></td>
      <td class="muted">${whCell}</td>
      <td class="muted">${places}×</td>
      <td><b>${totalQ}</b></td>
      <td class="muted"></td>
      <td class="muted">${priceCell}</td>
      <td></td></tr>`;
    if(exp){gl.forEach(l=>{
      const sel=state.isel.includes(l.id);
      const qtyCell=l.track==="unit"
        ? `1 ${t("iv.track_unit").split(" ")[0].toLowerCase()}<div class="muted" style="font-size:11px">${l.serial?"SN: "+esc(l.serial):""}${l.qr?" · "+esc(l.qr):""}</div>`
        : `<b>${l.quantity}</b> ks${l.qr?`<div class="muted" style="font-size:11px">📦 ${esc(l.qr)}</div>`:""}`;
      const wcol=whColor(l.warehouseId);
      const transit=l.status==="na_ceste";
      const arriving=transit&&(l.shipmentId||l.note==="doručuje sa");
      const rowStyle=`border-left:4px solid ${wcol};${transit?(arriving?"background:#fff4e6;":"background:#fdecec;"):""}`;
      const posCell=transit
        ? `<span class="tag o">${arriving?t("iv.arriving"):t("iv.transit")}</span>${l.expected?`<div class="muted" style="font-size:10.5px">${t("iv.eta")}: ${esc(l.expected)}</div>`:""}`
        : `<span class="pill" title="${esc(locDesc(l.warehouseId,l.location))}">${esc(l.location||"—")}</span>${locDesc(l.warehouseId,l.location)?`<div class="muted" style="font-size:10.5px">${esc(locDesc(l.warehouseId,l.location))}</div>`:""}`;
      body+=`<tr style="${rowStyle}">
        <td><input type="checkbox" ${sel?"checked":""} onchange="toggleSel(${l.id},this.checked)"></td>
        <td class="muted" style="font-size:11.5px;padding-left:26px">↳</td>
        <td><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${wcol};margin-right:6px;vertical-align:middle"></span>${esc(whName(l.warehouseId))}</td>
        <td>${posCell}</td>
        <td>${qtyCell}</td>
        <td><span class="tag ${l.state==="new"?"g":"gr"}">${l.state==="new"?t("iv.state_new"):t("iv.state_used")}</span>${l.stateNote?`<div class="muted" style="font-size:11px">${esc(l.stateNote)}</div>`:""}${l.note?`<div><span class="tag o" style="margin-top:3px">🔖 ${esc(l.note)}</span></div>`:""}${l.counted?` <span class="tag b">${t("iv.counted")}</span>`:""}</td>
        <td>${money(l.buyPrice,l.buyCur)}<div class="muted" style="font-size:11px">${esc(l.buyDate||"")}${l.invoice?" · "+esc(l.invoice):""}</div></td>
        <td style="text-align:right;white-space:nowrap">${canMove?`<button class="btn ghost sm" onclick="issueDialog(${l.id})">${t("iv.issue")}</button> <button class="btn ghost sm" onclick="lotDialog(${l.id})">${t("c.edit")}</button>`:""}</td></tr>`;
    });}
  });
  if(!pids.length)body=`<tr><td colspan="8"><div class="empty">${t("c.none")}</div></td></tr>`;
  // filtre
  const whOpts=`<option value="">${t("iv.filter_wh")}</option>`+db.warehouses.map(w=>`<option value="${w.id}" ${String(state.iwh)===String(w.id)?"selected":""}>${esc(w.name)}</option>`).join("");
  const locList=state.iwh?locsOf(state.iwh).map(x=>({code:x.code,desc:x.desc})):[...new Set(db.inventory.map(l=>l.location))].map(c=>({code:c,desc:""}));
  const locOpts=`<option value="">${t("iv.filter_loc")}</option>`+locList.map(l=>`<option value="${esc(l.code)}" ${state.iloc===l.code?"selected":""}>${esc(l.code)}${l.desc?" — "+esc(l.desc):""}</option>`).join("");
  const catOpts=`<option value="">${t("iv.filter_cat")}</option>`+db.categories.filter(c=>!c.parent).map(c=>`<option value="${c.id}" ${String(state.icat)===String(c.id)?"selected":""}>${esc(catLabel(c))}</option>`).join("");
  const stOpts=`<option value="">${t("iv.filter_state")}</option><option value="new" ${state.istate==="new"?"selected":""}>${t("iv.state_new")}</option><option value="used" ${state.istate==="used"?"selected":""}>${t("iv.state_used")}</option>`;
  const saved=(db.invFilters&&db.invFilters[state.role])||[];
  const savedOpts=`<option value="">${t("iv.myfilter")}</option>`+saved.map(f=>`<option value="${esc(f.name)}">${esc(f.name)}</option>`).join("");
  // bulk bar
  const nsel=state.isel.length;
  const bulk=nsel?`<div class="note" style="background:#eef4ff;border-color:#cfe0ff;color:#2a4fa0;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <b>${t("iv.selected",{n:nsel})}</b>
      ${canMove?`<button class="btn sm" onclick="bulkMoveDlg()">${t("iv.bulk_move")}</button>
      <button class="btn sm ghost" onclick="bulkStateDlg()">${t("iv.bulk_state")}</button>
      <button class="btn sm ghost" onclick="bulkCount()">${t("iv.bulk_count")}</button>`:""}
      <button class="btn sm ghost" onclick="clearSel()">${t("iv.clear_sel")}</button></div>`:"";
  // aktívny filter?
  const fActive=!!(state.iq||state.iwh||state.iloc||state.icat||state.istate);
  const activeBar=fActive?`<div class="note" style="background:#fff4e6;border-color:#f3d9ad;color:#8a5a12;display:flex;justify-content:space-between;align-items:center;gap:8px">
      <span><b>${t("iv.filter_active")}</b></span>
      <button class="btn sm" style="background:#e08a1e" onclick="clearInvFilters()">${t("iv.clear_filters")}</button></div>`:"";
  shell(t("inv.title"),t("inv.sub"),
    (canMove?`<button class="btn green" onclick="receiveDialog()">${t("iv.new_lot")}</button> <button class="btn danger" onclick="issueFind()">${t("dc.issue")}</button> `:"")+`<button class="btn ghost" onclick="manageLoc()">${t("iv.manage_loc")}</button> `+exportBtn("inventoryExport"),
    `<div class="toolbar">
       <input type="search" placeholder="${t("iv.search")}" oninput="state.iq=this.value;inventory()" value="${esc(state.iq)}">
       <select onchange="state.iwh=this.value;state.iloc='';inventory()">${whOpts}</select>
       <select onchange="state.iloc=this.value;inventory()">${locOpts}</select>
       <select onchange="state.icat=this.value;inventory()">${catOpts}</select>
       <select onchange="state.istate=this.value;inventory()">${stOpts}</select>
       <button class="btn ghost sm" onclick="clearInvFilters()" ${fActive?"":"disabled"}>${t("iv.clear_filters")}</button>
       <button class="btn ghost sm" onclick="selectAllFiltered()">${t("iv.select_all")}</button>
       <span style="width:1px;height:24px;background:var(--line)"></span>
       <select onchange="applyInvFilter(this.value)">${savedOpts}</select>
       <button class="btn ghost sm" onclick="saveInvFilter()">${t("iv.save_filter")}</button>
     </div>
     ${activeBar}
     ${bulk}
     <div class="panel"><table><thead><tr><th style="width:34px"></th><th>${t("iv.product")}</th><th>${t("iv.wh")}</th><th>${t("iv.loc")}</th><th>${t("iv.qty")}</th><th>${t("iv.state")}</th><th>${t("iv.buy")}</th><th></th></tr></thead><tbody>${body}</tbody></table></div>`);
}
function toggleExp(pid){const i=state.iexp.indexOf(pid);if(i>=0)state.iexp.splice(i,1);else state.iexp.push(pid);inventory();}
function toggleSel(id,on){const i=state.isel.indexOf(id);if(on&&i<0)state.isel.push(id);if(!on&&i>=0)state.isel.splice(i,1);inventory();}
function groupToggle(pid,on){db.inventory.filter(l=>l.productId===pid&&invMatch(l)).forEach(l=>{const i=state.isel.indexOf(l.id);if(on&&i<0)state.isel.push(l.id);if(!on&&i>=0)state.isel.splice(i,1);});inventory();}
function selectAllFiltered(){state.isel=db.inventory.filter(invMatch).map(l=>l.id);state.iexp=[...new Set(db.inventory.filter(invMatch).map(l=>l.productId))];inventory();}
function clearSel(){state.isel=[];inventory();}
function clearInvFilters(){state.iq="";state.iwh="";state.iloc="";state.icat="";state.istate="";inventory();}
// hromadné akcie
function bulkMoveDlg(){modal(t("iv.move_title"),
  `<div class="fld"><label>${t("iv.target_wh")}</label><select id="bm_wh" onchange="refreshLoc('bm_wh','bm_loc')">${db.warehouses.map(w=>`<option value="${w.id}">${esc(w.name)}</option>`).join("")}</select></div>
   <div class="fld"><label>${t("iv.target_loc")}</label><select id="bm_loc"></select></div>`,
  `<button class="btn ghost" onclick="closeModal()">${t("c.cancel")}</button><button class="btn" onclick="applyBulkMove()">${t("iv.bulk_move")}</button>`);

function applyBulkMove(){const wh=Number($("#bm_wh").value),loc=$("#bm_loc").value;db.inventory.forEach(l=>{if(state.isel.includes(l.id)){l.warehouseId=wh;l.location=loc;}});save();state.isel=[];closeModal();inventory();}
function bulkStateDlg(){modal(t("iv.state_title"),
  `<div class="fld"><label>${t("iv.state")}</label><select id="bs_st"><option value="new">${t("iv.state_new")}</option><option value="used">${t("iv.state_used")}</option></select></div>
   <div class="fld"><label>${t("iv.state_note")}</label><input id="bs_note" placeholder="${t("iv.state_note")}"></div>`,
  `<button class="btn ghost" onclick="closeModal()">${t("c.cancel")}</button><button class="btn" onclick="applyBulkState()">${t("iv.bulk_state")}</button>`);}
function applyBulkState(){const st=$("#bs_st").value,note=$("#bs_note").value.trim();db.inventory.forEach(l=>{if(state.isel.includes(l.id)){l.state=st;if(note)l.stateNote=note;}});save();state.isel=[];closeModal();inventory();}
function bulkCount(){db.inventory.forEach(l=>{if(state.isel.includes(l.id))l.counted=true;});save();state.isel=[];inventory();}
// uložené filtre používateľa
function saveInvFilter(){const name=prompt(t("iv.save_filter_prompt"));if(!name||!name.trim())return;db.invFilters=db.invFilters||{};db.invFilters[state.role]=db.invFilters[state.role]||[];const def={iq:state.iq,iwh:state.iwh,iloc:state.iloc,icat:state.icat,istate:state.istate};const ex=db.invFilters[state.role].find(f=>f.name===name.trim());if(ex)ex.def=def;else db.invFilters[state.role].push({name:name.trim(),def});save();inventory();}
function applyInvFilter(name){if(!name)return;const f=((db.invFilters||{})[state.role]||[]).find(f=>f.name===name);if(!f)return;Object.assign(state,f.def);state.isel=[];inventory();}
// príjem / úprava šarže
function refreshLoc(whSel,locSel){const w=$("#"+whSel);if(!w)return;const box=$("#"+locSel);if(box)box.innerHTML=locOptionsHtml(w.value,"")||`<option value="">—</option>`;}

function toggleTrack(v){$("#l_unitbox").style.display=v==="bulk"?"none":"grid";$("#l_bulkbox").style.display=v==="bulk"?"grid":"none";}
function saveLot(id){
  const track=$("#l_track").value;

   `<div class="fld"><label>${t("iv.wh")}</label><select id="ml_wh" onchange="manageLocRefresh(this.value)">${db.warehouses.map(w=>`<option value="${w.id}" ${w.id===Number(whId)?"selected":""}>${esc(w.name)}</option>`).join("")}</select></div>

function manageLocRefresh(whId){const w=db.warehouses.find(w=>w.id===Number(whId));const box=$("#ml_list");if(!box)return;
  box.innerHTML=`<div class="kv" style="border:0"><div class="k" style="font-size:11px;text-transform:uppercase;color:var(--grey)">${t("iv.loc_code")}</div><div style="font-size:11px;text-transform:uppercase;color:var(--grey)">${t("iv.loc_desc")}</div></div>`+
   (w.locations||[]).map((l,i)=>`<div class="comp-row"><input style="width:110px;flex:none" value="${esc(l.code)}" onchange="renameLoc(${w.id},${i},'code',this.value)"><input style="flex:1" value="${esc(l.desc||"")}" placeholder="${t("iv.loc_desc")}" onchange="renameLoc(${w.id},${i},'desc',this.value)"><button class="btn danger sm" type="button" onclick="delLoc(${w.id},${i})">×</button></div>`).join("")||`<div class="muted" style="font-size:12.5px;margin-bottom:8px">—</div>`;}
function addLoc(){const whId=Number($("#ml_wh").value);const code=prompt(t("iv.loc_code")+":");if(!code||!code.trim())return;const desc=prompt(t("iv.loc_desc")+":")||"";const w=db.warehouses.find(w=>w.id===whId);w.locations=w.locations||[];w.locations.push({code:code.trim(),desc:desc.trim()});save();manageLocRefresh(whId);}
function renameLoc(whId,i,field,val){const w=db.warehouses.find(w=>w.id===whId);const old=w.locations[i].code;w.locations[i][field]=val.trim();if(field==="code"&&old!==val.trim()){db.inventory.forEach(l=>{if(l.warehouseId===whId&&l.location===old)l.location=val.trim();});}save();}
function delLoc(whId,i){const w=db.warehouses.find(w=>w.id===whId);const loc=w.locations[i];
  const occ=db.inventory.filter(l=>l.warehouseId===whId&&l.location===loc.code).length;
  if(occ>0){alert(t("iv.loc_occupied",{c:loc.code,n:occ}));return;}
  if(!confirm(t("iv.loc_del_confirm",{c:loc.code})))return;
  w.locations.splice(i,1);save();manageLocRefresh(whId);}

function doIssue(lotId){
  const l=db.inventory.find(x=>x.id===lotId);if(!l)return;const p=prod(l.productId)||{};
  let qty=l.track==="bulk"?Math.max(1,Math.min(Number($("#is_qty").value||1),l.quantity)):1;
  const via=$("#is_via").value,reason=$("#is_reason").value.trim(),doc=$("#is_doc").value.trim(),note=$("#is_note").value.trim();
  logMove({type:"vydaj",productId:l.productId,lotId:l.id,qty,warehouseId:l.warehouseId,location:l.location,serial:l.serial||"",qr:l.qr||"",via,doc,purpose:reason,note});
  if(l.track==="bulk"){l.quantity-=qty;if(l.quantity<=0)db.inventory=db.inventory.filter(x=>x.id!==lotId);}
  else db.inventory=db.inventory.filter(x=>x.id!==lotId);
  save();closeModal();inventory();
}

// ---- INVENTÚRA (cyklus) ----
function stockDue(p){if(p.stockCycle==="none")return false;if(!p.lastCountAt)return true;const days=(Date.now()-new Date(p.lastCountAt).getTime())/86400000;return p.stockCycle==="monthly"?days>=30:days>=365;}
function stocktake(){
  let list=db.products.filter(p=>p.stockCycle!=="none");
  if(state.stOnlyDue)list=list.filter(stockDue);
  const cyc={monthly:t("st.monthly"),yearly:t("st.yearly"),none:t("st.none")};
  const rows=list.map(p=>{
    const total=db.inventory.filter(l=>l.productId===p.id).reduce((s,l)=>s+(Number(l.quantity)||0),0);
    const due=stockDue(p);
    return `<tr>
     <td><b>${esc(p.name)}</b><div class="muted" style="font-size:11.5px">${esc(catPath(p.categoryId))}</div></td>
     <td><select onchange="setCycle(${p.id},this.value)">${["monthly","yearly","none"].map(c=>`<option value="${c}" ${p.stockCycle===c?"selected":""}>${cyc[c]}</option>`).join("")}</select></td>
     <td>${total}</td>
     <td>${p.lastCountAt?esc(p.lastCountAt):`<span class="muted">${t("st.never")}</span>`}</td>
     <td>${due?`<span class="tag r">${t("st.overdue")}</span>`:`<span class="tag g">${t("st.ok")}</span>`}</td>
     <td style="text-align:right"><button class="btn sm" onclick="countDialog(${p.id})">${t("st.count")}</button></td>
   </tr>`;}).join("")||`<tr><td colspan="6"><div class="empty">${t("c.none")}</div></td></tr>`;
  shell(t("st.title"),t("st.sub"),"",
    `<div class="toolbar"><label class="chk"><input type="checkbox" ${state.stOnlyDue?"checked":""} onchange="state.stOnlyDue=this.checked;stocktake()"> ${t("st.only_due")}</label></div>
     <div class="panel"><table><thead><tr><th>${t("st.product")}</th><th>${t("st.cycle")}</th><th>${t("st.total")}</th><th>${t("st.last")}</th><th>${t("st.status")}</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`);
}
function setCycle(pid,c){prod(pid).stockCycle=c;save();stocktake();}
function countDialog(pid){
  const p=prod(pid);const lots=db.inventory.filter(l=>l.productId===pid);
  modal(t("st.count_title")+" — "+esc(p.name),
   (lots.length?lots.map(l=>`<div class="comp-row"><span style="flex:1;font-size:12.5px">${esc(whName(l.warehouseId))} · ${esc(l.location)} ${l.serial?"· "+esc(l.serial):""} <span class="muted">(${t("st.total")}: ${l.quantity})</span></span><input type="number" min="0" style="width:90px" id="cnt_${l.id}" value="${l.quantity}"></div>`).join(""):`<div class="muted">${t("c.none")}</div>`),
   `<button class="btn ghost" onclick="closeModal()">${t("c.cancel")}</button><button class="btn" onclick="saveCount(${pid})">${t("st.save")}</button>`);
}
function saveCount(pid){
  const p=prod(pid);const lots=db.inventory.filter(l=>l.productId===pid);let corr=0;
  lots.forEach(l=>{const el=$("#cnt_"+l.id);if(!el)return;const nq=Number(el.value);if(!isNaN(nq)&&nq!==l.quantity){const diff=nq-l.quantity;logMove({type:"korekcia",productId:pid,lotId:l.id,qty:diff,warehouseId:l.warehouseId,location:l.location,via:"",doc:"inventúra",purpose:"korekcia stavu"});l.quantity=nq;corr++;}l.counted=true;});
  p.lastCountAt=new Date().toISOString().slice(0,10);
  save();closeModal();alert(t("st.done",{n:corr}));stocktake();}

function qrModeUI(){const m=$("#qr_mode").value;$("#qr_prodf").style.display=(m==="product")?"block":"none";$("#qr_textf").style.display=(m==="custom")?"block":"none";$("#qr_webhint").style.display=(m==="web")?"block":"none";}
function qrGenerate(){
  const m=$("#qr_mode").value;const compIdx=Number($("#qr_comp").value);const comp=compIdx>=0?db.companies[compIdx]:null;
  const sizeCm=Number($("#qr_size").value);const cols=Math.max(1,Number($("#qr_cols").value)||4);
  const seq=$("#qr_seq")&&$("#qr_seq").checked;const prefix=($("#qr_prefix")&&$("#qr_prefix").value||"QR-").trim();
  const codesN=Math.max(1,Number($("#qr_codes").value)||1);const dupes=Math.max(1,Number($("#qr_dupes").value)||3);
  const cut=$("#qr_cut")&&$("#qr_cut").checked;
  const cellW=sizeCm*10; // mm
  const mkData=(code)=>{if(m==="web")return (comp?comp.web:"https://oneminers.com")+"/i/"+code;if(comp)return comp.web+"/p/"+code;return code;};
  let baseCode="";
  if(m==="product"){const p=prod(Number($("#qr_prod").value))||{};baseCode="P"+(p.id||0);}
  else if(m==="custom"){baseCode=($("#qr_text").value||"000").trim();}
  else baseCode=String(Date.now()).slice(-6);
  const cells=[];
  for(let c=0;c<codesN;c++){
    const code=seq?(prefix+baseCode+"-"+String(c+1).padStart(3,"0")):(prefix+baseCode);
    const data=mkData(code);
    const label=(m==="product")?((prod(Number($("#qr_prod").value))||{}).name||code)+(seq?" · "+code:""):(m==="web"?data:code);
    for(let d=0;d<dupes;d++){ // vždy N rovnakých na kód
      cells.push(`<div class="qrcell${cut?" cut":""}" style="width:${cellW}mm"><img src="${qrImg(data,300)}" style="width:${cellW}mm;height:${cellW}mm"><div class="qlbl">${comp?"<b>"+esc(comp.name)+"</b><br>":""}${esc(label)}</div></div>`);
    }
  }
  $("#qr_sheet").innerHTML=`<div class="qrsheet${cut?" cut":""}" style="max-width:${cols*(cellW+6)+14}mm">${cells.join("")}</div>`;
}

      <div id="s_customsbox" style="display:${(s.customs||s.nonEu)?"block":"none"}">
        <div class="row2"><div class="fld"><label>${t("sh.jds")}</label><input id="s_jds" value="${esc(s.jds||"")}" placeholder="26CZ600000CABG4DR4"></div><div class="fld"><label>${t("sh.awb")}</label><input id="s_awb" value="${esc(s.awb||"")}"></div></div>
        <div class="row3"><div class="fld"><label>${t("sh.customs_value")}</label><input id="s_cval" type="number" step="any" value="${esc(s.customsValue)}"></div><div class="fld"><label>${t("sh.duty")}</label><input id="s_duty" type="number" step="any" value="${esc(s.duty)}"></div><div class="fld"><label>${t("sh.proc_fee")}</label><input id="s_pfee" type="number" step="any" value="${esc(s.procFee)}"></div></div>
      </div>
    </div>`,
   `<button class="btn ghost" onclick="closeModal()">${t("c.cancel")}</button><button class="btn" onclick="saveShip(${id||0})">${t("c.save")}</button>`);
  shDirToggle(dir);renderShipItems();
}
let shipItems=[];
function renderShipItems(){const box=$("#s_items");if(!box)return;box.innerHTML=shipItems.map((it,i)=>`<div class="comp-row"><select onchange="shipItems[${i}].productId=Number(this.value)">${db.products.map(p=>`<option value="${p.id}" ${p.id===it.productId?"selected":""}>${esc(p.name)}</option>`).join("")}</select><input type="number" min="1" value="${it.qty}" onchange="shipItems[${i}].qty=Number(this.value)"><button class="btn danger sm" type="button" onclick="shipRmItem(${i})">×</button></div>`).join("")||`<div class="muted" style="font-size:12px;margin-bottom:6px">—</div>`;}
function shipAddItem(){shipItems.push({productId:db.products[0].id,qty:1});renderShipItems();}
function shipRmItem(i){shipItems.splice(i,1);renderShipItems();}
function shDirToggle(dir){const inb=dir==="inbound";const pin=$("#s_payin"),pout=$("#s_payout"),sf=$("#s_senderf"),of=$("#s_orderf");if(pin)pin.style.display=inb?"block":"none";if(pout)pout.style.display=inb?"none":"block";if(sf)sf.style.display=inb?"block":"none";if(of)of.style.display=inb?"none":"block";}
function saveShip(id){
  const dir=$("#s_dir").value;
  const contentsText=shipItems.map(it=>{const p=prod(it.productId);return it.qty+"× "+(p?p.name:"?");}).join(", ");
  const o={tracking:$("#s_tr").value.trim(),carrier:$("#s_ca").value.trim(),direction:dir,status:$("#s_st").value.trim(),from:$("#s_from").value.trim(),to:$("#s_to").value.trim(),exp:$("#s_exp").value,items:shipItems.slice(),contents:contentsText,
    sender:$("#s_sender").value.trim(),ourOrder:$("#s_order").value.trim(),
    paid:$("#s_paid").checked,invoice:$("#s_inv").value.trim(),paidWhere:$("#s_paidwhere").value.trim(),
    custPay:$("#s_custpay").value,shipCost:$("#s_shipcost").value===""?null:Number($("#s_shipcost").value),shipCostCur:$("#s_shipcur").value,
    payAmt:$("#s_amt").value===""?null:Number($("#s_amt").value),payCur:$("#s_cur").value,cryptoTx:(id?db.shipments.find(x=>x.id===id).cryptoTx:""),
    incoterm:$("#s_incoterm").value,customs:$("#s_customs").checked,nonEu:$("#s_customs").checked,jds:$("#s_jds").value.trim(),awb:$("#s_awb").value.trim(),customsValue:$("#s_cval").value===""?null:Number($("#s_cval").value),duty:$("#s_duty").value===""?null:Number($("#s_duty").value),procFee:$("#s_pfee").value===""?null:Number($("#s_pfee").value)};
  if(!o.tracking){alert(t("dash.tracking"));return;}
  if(id){Object.assign(db.shipments.find(x=>x.id===id),o);}else{o.id=db.seq.shipment++;db.shipments.push(o);}
  save();closeModal();shipments();}

// ---- ROLES / USERS / CURRENCIES ----
function roles(){const rolesArr=["admin","user","visitor","external"];let html="",curG="";PERMS.forEach(p=>{if(p.g!==curG){curG=p.g;html+=`<tr class="grp-row"><td colspan="5">${PGRP[p.g][lang]||p.g}</td></tr>`;}html+=`<tr><td>${esc(p.l[lang]||p.l.sk)}<div class="muted" style="font-size:11px">${esc(p.code)}</div></td>`+rolesArr.map(r=>`<td style="text-align:center"><input type="checkbox" ${db.matrix[r][p.code]?"checked":""} onchange="togglePerm('${r}','${p.code}',this.checked)"></td>`).join("")+`</tr>`;});const editable=state.role==="admin";shell(t("ro.title"),editable?t("ro.sub"):t("ro.sub_ro"),editable?`<button class="btn ghost sm" onclick="resetMatrix()">${t("ro.reset")}</button>`:"",`${!editable?'<div class="note">'+t("ro.readonly",{r:state.role})+'</div>':''}<div class="panel"><table><thead><tr><th>${t("ro.col_perm")}</th><th style="text-align:center">Admin</th><th style="text-align:center">User</th><th style="text-align:center">Visitor</th><th style="text-align:center">External</th></tr></thead><tbody>${html}</tbody></table></div>`);if(!editable)document.querySelectorAll("#main input[type=checkbox]").forEach(c=>c.disabled=true);}
function togglePerm(r,code,val){if(state.role!=="admin"){render();return;}db.matrix[r][code]=val;save();}
function resetMatrix(){if(confirm(t("ro.reset")+"?")){db.matrix=JSON.parse(JSON.stringify(DEFAULT_MATRIX));save();roles();}}
function users(){const canM=can("user.manage");const rows=db.users.map(u=>`<tr><td><b>${esc(u.name)}</b><div class="muted" style="font-size:11.5px">${esc(u.email)}</div></td><td><span class="tag b">${esc(u.role)}</span></td><td>${esc(u.scope)}</td><td>${u.active?'<span class="tag g">'+t("us.active")+'</span>':'<span class="tag gr">'+t("us.inactive")+'</span>'}</td></tr>`).join("");shell(t("us.title"),canM?t("us.sub"):t("us.sub_ro"),"",`${!canM?'<div class="note">'+t("us.nomanage")+'</div>':''}<div class="panel"><table><thead><tr><th>${t("us.col_user")}</th><th>${t("us.col_role")}</th><th>${t("us.col_scope")}</th><th>${t("us.col_state")}</th></tr></thead><tbody>${rows}</tbody></table></div><div class="panel"><div class="ph"><h3>${t("us.ext")}</h3></div><table><thead><tr><th>${t("us.col_name")}</th><th>${t("us.col_type")}</th><th>${t("us.col_access")}</th></tr></thead><tbody><tr><td><b>Partner API</b><div class="muted" style="font-size:11.5px">api@partner.com</div></td><td><span class="tag p">external</span></td><td>${t("us.ext_access")}</td></tr></tbody></table></div>`);}
function currencies(){const rows=db.currencies.map(c=>`<tr><td><b>${esc(c.code)}</b>${c.primary?' <span class="tag b">'+t("cu.primary")+'</span>':''}</td><td>${esc(c.name)}</td><td>${c.type==="crypto"?'<span class="tag p">'+t("cu.crypto")+'</span>':'<span class="tag gr">'+t("cu.fiat")+'</span>'}</td><td>${c.decimals}</td><td>${c.active?'<span class="tag g">'+t("cu.active")+'</span>':'<span class="tag gr">'+t("cu.off")+'</span>'}</td><td style="text-align:right">${!c.primary?`<button class="btn ghost sm" onclick="setPrimary('${c.code}')">${t("cu.setprimary")}</button>`:''} <button class="btn ghost sm" onclick="toggleCur('${c.code}')">${c.active?t("cu.disable"):t("cu.enable")}</button></td></tr>`).join("");shell(t("cu.title"),t("cu.sub"),"",`<div class="panel"><table><thead><tr><th>${t("cu.col_code")}</th><th>${t("cu.col_name")}</th><th>${t("cu.col_type")}</th><th>${t("cu.col_dec")}</th><th>${t("cu.col_state")}</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`);}
function setPrimary(code){db.currencies.forEach(c=>c.primary=(c.code===code));save();currencies();}
function toggleCur(code){const c=cur(code);if(c.primary){return;}c.active=!c.active;save();currencies();}
function resetData(){if(confirm(t("c.reset")+"?")){db=seed();save();render();}}
applyStatic();document.documentElement.lang=lang;render();
</script>
</body>
</html>
