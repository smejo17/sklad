<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sklad — testovacia appka</title>
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<!-- LOGIN -->
<div id="loginView" class="center wrap">
  <div class="login"><div class="card">
    <h2>Sklad — prihlásenie</h2>
    <div class="muted" style="margin-top:4px">Testovacia verzia · dáta v Supabase</div>
    <label>E-mail</label><input id="li_email" type="email" autocomplete="username">
    <label>Heslo</label><input id="li_pass" type="password" autocomplete="current-password">
    <button class="btn" id="li_btn" onclick="doLogin()">Prihlásiť sa</button>
    <div id="li_msg"></div>
  </div></div>
</div>

<!-- APP -->
<div id="appView" class="hide">
  <!-- Bočné menu (PC) -->
  <aside id="sidebar">
    <div class="sb-brand"><b>Sklad &amp; Zásielky</b><div class="v">testovacia verzia · v1.1</div></div>
    <nav class="sb-nav">
      <div class="sb-grp">Sklad</div>
      <button id="nav_recv" onclick="setTab('recv')">📥 Príjem</button>
      <button id="nav_issue" onclick="setTab('issue')">📤 Výdaj</button>
      <button id="nav_stock" onclick="setTab('stock')">🗄️ Zásoby</button>
      <button id="nav_prods" onclick="setTab('prods')">📦 Produkty</button>
      <div class="sb-grp">Zásielky a servis</div>
      <button id="nav_ship" onclick="setTab('ship')">🚚 Zásielky</button>
      <button id="nav_repairs" onclick="setTab('repairs')">🛠️ Opravy a reklamácie</button>
      <button id="nav_assets" onclick="setTab('assets')">🖥️ Majetok</button>
      <div class="sb-grp">Doklady</div>
      <button id="nav_docs" onclick="setTab('docs')">🧾 Doklady (príjem/výdaj)</button>
      <button id="nav_qr" onclick="setTab('qr')">🏷️ Tlač QR kódov</button>
      <div class="sb-grp" id="grp_admin">Administrácia</div>
      <button id="nav_cats" onclick="setTab('cats')">🗂️ Kategórie a tagy</button>
      <button id="nav_dupes" onclick="setTab('dupes')">👯 Duplicity</button>
      <button id="nav_admin" onclick="setTab('admin')">⚙️ Správa</button>
    </nav>
    <div class="sb-foot">
      <div class="lbl">Prihlásený ako</div>
      <div class="who2"><span id="sb_email"></span> <span id="sb_role" class="tag"></span></div>
      <button class="btn ghost sm" id="modeBtn2" onclick="toggleMode()">📱 Mobilná verzia</button>
      <button class="btn ghost sm" onclick="doLogout()">Odhlásiť sa</button>
    </div>
  </aside>
  <div id="main">
    <!-- Horný bar + taby (mobil) -->
    <div class="top">
      <div><b>Sklad</b> <span id="a_role" class="tag"></span><div class="who" id="a_email"></div></div>
      <div style="display:flex;gap:8px"><button class="btn ghost sm" id="modeBtn" onclick="toggleMode()">💻</button><button class="btn ghost sm" onclick="doLogout()">Odhlásiť</button></div>
    </div>
    <!-- Hlavička stránky (PC) -->
    <div class="pagehead"><h1 id="pageTitle">Sklad</h1><div class="sub" id="pageSub"></div></div>
    <div class="wrap">
      <div class="tabs">
        <button id="tab_recv" onclick="setTab('recv')">📥 Príjem</button>
        <button id="tab_issue" onclick="setTab('issue')">📤 Výdaj</button>
        <button id="tab_stock" onclick="setTab('stock')">🗄️ Zásoby</button>
        <button id="tab_ship" onclick="setTab('ship')">🚚 Zásielky</button>
        <button id="tab_repairs" onclick="setTab('repairs')">🛠️ Opravy</button>
        <button id="tab_assets" onclick="setTab('assets')">🖥️ Majetok</button>
        <button id="tab_prods" onclick="setTab('prods')">📦 Produkty</button>
        <button id="tab_docs" onclick="setTab('docs')">🧾 Doklady</button>
        <button id="tab_qr" onclick="setTab('qr')">🏷️ QR</button>
        <button id="tab_cats" onclick="setTab('cats')" class="hide">🗂️ Kategórie</button>
        <button id="tab_dupes" onclick="setTab('dupes')" class="hide">👯 Duplicity</button>
        <button id="tab_admin" onclick="setTab('admin')" class="hide">⚙️ Správa</button>
      </div>
      <div id="view"></div>
    </div>
  </div>
</div>

<!-- SCANNER -->
<div id="scanOverlay" class="hide">
  <div class="lbl" id="scanLbl">Namier na kód · pri malom priblíž zoomom alebo odfoť</div>
  <div id="scanHint" class="hide" style="color:#ffd27a;background:rgba(0,0,0,.4);border:1px solid #ffd27a;border-radius:8px;padding:8px 10px;margin-bottom:10px;max-width:340px;text-align:center;font-size:14px"></div>
  <div id="reader"></div>
  <div style="width:100%;max-width:340px;margin-top:10px">
    <div id="zoomWrap" class="hide" style="display:flex;align-items:center;gap:8px;color:#fff;margin-bottom:8px"><span>Zoom</span><input id="zoomSlider" type="range" style="flex:1" oninput="applyZoom(this.value)"></div>
    <div style="display:flex;gap:8px"><button class="btn ghost" id="torchBtn" style="flex:1;display:none" onclick="toggleTorch()">🔦 Svetlo</button><button class="btn ghost" style="flex:1" onclick="scanPhotoPick()">🖼️ Odfotiť kód</button></div>
    <button class="btn ghost" style="width:100%;margin-top:8px" onclick="closeScan()">Zrušiť</button>
  </div>
  <input id="photoInput" type="file" accept="image/*" capture="environment" class="hide" onchange="scanPhotoFile(this.files[0])">
  <div id="photoReader" class="hide"></div>
</div>
<input id="aiPhoto" type="file" accept="image/*" capture="environment" class="hide" onchange="aiFile(this.files[0])">

<!-- OREZANIE FOTKY (sériové číslo) -->
<div id="cropOverlay" class="hide">
  <div class="lbl" style="color:#fff;margin-bottom:8px;font-size:14px">Ťahaním prsta/myši označ sériové číslo, potom „Orezať"</div>
  <div id="cropStage"><img id="cropImg" alt=""><div id="cropSel"></div></div>
  <div style="display:flex;gap:8px;margin-top:12px;max-width:360px;width:100%">
    <button class="btn green" style="flex:1" onclick="cropApply()">✓ Orezať a uložiť</button>
    <button class="btn ghost" style="flex:1" onclick="cropCancel()">Zrušiť</button></div>
</div>

<!-- MODAL -->
<div id="modalOverlay" class="hide"><div id="modalCard"></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="./app.js"></script>
</body>
</html>
